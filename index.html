<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISBN Scanner</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
    <h1>&#128218; ISBN Book Lookup</h1>
    <div id="syncBadge" onclick="toggleSyncPanel()" title="Sync settings">
        &#128225; <span class="sync-dot" id="syncDot" style="background:#999;"></span>
    </div>
    
    <div class="search-section">
        <input type="text" id="isbnInput" placeholder="Enter ISBN (10 or 13 digits)" autocomplete="off" onkeypress="if(event.key==='Enter') lookupBook()">
        <div class="button-group">
            <button onclick="lookupBook()">&#128269; Search</button>
            <button id="scanBtn" onclick="toggleScan()">&#128247; Scan</button>
        </div>
    </div>
    
    <div id="scannerModal" class="modal" onclick="if(event.target==this)stopScanner()">
        <div class="modal-content" style="max-width:500px;">
            <div class="modal-header">
                <h2 style="margin:0;">Scan ISBN</h2>
                <button class="modal-close" onclick="stopScanner()">&#10005;</button>
            </div>
            <div class="modal-body" style="padding:20px;">
                <p id="scanStatus" style="margin:0 0 12px;text-align:center;font-size:14px;color:var(--text-muted);">Point camera at book barcode...</p>
                <div id="scanner" style="width:100%;max-width:400px;margin:0 auto;border-radius:8px;overflow:hidden;"></div>
            </div>
        </div>
    </div>
    
    <div id="result"></div>

    <h2>My Collection</h2>
    <div class="export-import-group">
        <button onclick="exportCollection()">&#128190; Export</button>
        <button onclick="importCollection()">&#128229; Import</button>
        <button id="resyncBtn" onclick="resyncCollection()">&#128260; Resync</button>
    </div>
    <input type="file" id="importFile" style="display:none" accept=".json" onchange="handleImport(this)">
    <div id="syncPanel" class="sync-dropdown" style="display:none;">
        <div class="sync-panel-header">
            <span>&#128225; Sync</span>
            <span class="sync-status">
                <span id="syncStatusText"></span>
                <button onclick="toggleSyncPanel()" class="sync-panel-close">&#10005;</button>
            </span>
        </div>
        <div class="sync-body">
            <div class="sync-room-row">
                <input type="text" id="syncRoomInput" readonly value="">
                <button id="syncEditBtn" onclick="toggleSyncEdit()">Edit</button>
                <button id="syncShareBtn" onclick="shareRoom()" title="Copy room code">&#128203;</button>
                <button onclick="showQrCode()" title="Show QR code">&#128260;</button>
                <button onclick="startQrSyncScan()" title="Scan QR code to join room">&#128247;</button>
            </div>
            <div class="sync-actions" id="syncActions" style="display:none;">
                <button id="syncJoinBtn" onclick="joinRoom()">Join Room</button>
                <button id="syncCancelBtn" onclick="cancelSyncEdit()">Cancel</button>
            </div>
            <div class="sync-actions" style="margin-top:4px;">
                <button onclick="toggleDarkMode()" style="background:#555;font-size:13px;padding:8px;" id="darkModeBtn">&#127769; Dark</button>
            </div>
        </div>
    </div>
    <div id="qrScannerContainer" style="display:none;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <p style="margin:0;font-size:14px;color:var(--text-muted);">Point camera at QR code</p>
            <button onclick="stopQrSyncScan()" style="padding:6px 12px;font-size:13px;background:#f44336;">&#10005;</button>
        </div>
        <div id="qrScannerElement"></div>
    </div>
    <div id="toast"></div>
    <div id="qrModal" class="modal" onclick="if(event.target==this)closeQrModal()">
        <div class="modal-content" style="max-width:360px;text-align:center;">
            <div class="modal-header">
                <h2 style="margin:0;">Sync Room QR</h2>
                <button class="modal-close" onclick="closeQrModal()">&#10005;</button>
            </div>
            <div class="modal-body" style="padding:24px;">
                <div id="qrCodeContainer" style="margin:0 auto 16px;width:200px;height:200px;"></div>
                <p id="qrRoomCode" style="font-family:monospace;font-size:18px;font-weight:600;margin:0 0 8px;"></p>
                <p style="color:var(--text-muted);font-size:13px;margin:0;">Scan with another device to join this sync room</p>
            </div>
        </div>
    </div>
    <div id="collection"></div>

    <div id="bookModal" class="modal" onclick="closeModalOnBackdrop(event)">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <button class="modal-close" onclick="closeModal()">&#10005;</button>
            </div>
            <div class="modal-body">
                <div class="modal-cover" id="modalCover"></div>
                <div class="modal-info" id="modalInfo"></div>
                <div class="modal-description" id="modalDescription"></div>
            </div>
            <div class="modal-footer">
                <button onclick="closeModal()" style="background: #666;">Close</button>
                <button onclick="deleteFromModal()" style="background: #f44336;">&#128465; Delete</button>
            </div>
        </div>
    </div>

    <script src="bookLookup.js"></script>
    <script src="scanner.js"></script>
    <script type="module">
        import { initialize } from './sync.js'

        window.showToast = function(msg, type) {
            const container = document.getElementById('toast')
            const el = document.createElement('div')
            el.className = 'toast-msg ' + (type || 'info')
            el.textContent = msg
            container.appendChild(el)
            setTimeout(() => { if (el.parentNode) el.remove() }, 2500)
        }

        document.addEventListener('click', (e) => {
            const panel = document.getElementById('syncPanel')
            const badge = document.getElementById('syncBadge')
            if (panel && panel.style.display !== 'none' && !panel.contains(e.target) && !badge.contains(e.target)) {
                panel.style.display = 'none'
            }
        })

        window.toggleSyncPanel = function() {
            const panel = document.getElementById('syncPanel')
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none'
            if (panel.style.display === 'block' && window.syncAPI) {
                const input = document.getElementById('syncRoomInput')
                if (input) input.value = window.syncAPI.getRoom() || ''
            }
        }

        async function updateSyncUI(status) {
            const dot = document.getElementById('syncDot')
            const text = document.getElementById('syncStatusText')
            const input = document.getElementById('syncRoomInput')
            if (status.connected) {
                dot.style.background = '#4CAF50'
                if (text) text.textContent = `Connected — ${status.peers} device${status.peers === 1 ? '' : 's'}`
            } else if (status.room) {
                dot.style.background = '#FF9800'
                if (text) text.textContent = 'Connecting...'
            } else {
                dot.style.background = '#999'
                if (text) text.textContent = 'Disconnected'
            }
            if (input && status.room) input.value = status.room
        }

        window.toggleSyncEdit = function() {
            const input = document.getElementById('syncRoomInput')
            const editBtn = document.getElementById('syncEditBtn')
            const actions = document.getElementById('syncActions')
            if (input.readOnly) {
                input.readOnly = false
                input.focus()
                editBtn.textContent = 'Cancel'
                actions.style.display = 'flex'
            } else {
                cancelSyncEdit()
            }
        }

        window.cancelSyncEdit = function() {
            const input = document.getElementById('syncRoomInput')
            const editBtn = document.getElementById('syncEditBtn')
            const actions = document.getElementById('syncActions')
            input.readOnly = true
            editBtn.textContent = 'Edit'
            actions.style.display = 'none'
            input.value = window.syncAPI ? (window.syncAPI.getRoom() || '') : ''
        }

        window.joinRoom = function() {
            const room = document.getElementById('syncRoomInput').value.trim()
            if (!room || !window.syncAPI) return
            window.syncAPI.setRoom(room)
            cancelSyncEdit()
        }

        window.shareRoom = function() {
            if (!window.syncAPI) return
            const room = window.syncAPI.getRoom()
            if (!room) return
            if (navigator.share) {
                navigator.share({ title: 'Join my book collection', text: `Join my ISBN Scanner sync room: ${room}` })
            } else {
                navigator.clipboard.writeText(room)
                    .then(() => showToast('Room code copied!', 'success'))
                    .catch(() => prompt('Share this room code with another device:', room))
            }
        }

        let qrCodeInstance = null

        window.showQrCode = function() {
            if (!window.syncAPI) return
            const room = window.syncAPI.getRoom()
            if (!room) return
            const container = document.getElementById('qrCodeContainer')
            container.innerHTML = ''
            if (qrCodeInstance) { qrCodeInstance.clear(); qrCodeInstance = null }
            qrCodeInstance = new QRCode(container, { text: room, width: 200, height: 200 })
            document.getElementById('qrRoomCode').textContent = room
            document.getElementById('qrModal').classList.add('active')
            document.body.style.overflow = 'hidden'
        }

        window.closeQrModal = function() {
            document.getElementById('qrModal').classList.remove('active')
            document.body.style.overflow = ''
        }

        let qrSyncScanner = null

        window.startQrSyncScan = async function() {
            if (!window.syncAPI) return
            const container = document.getElementById('qrScannerContainer')
            container.style.display = 'block'
            container.scrollIntoView({ behavior: 'smooth' })

            qrSyncScanner = new Html5Qrcode('qrScannerElement')

            try {
                await qrSyncScanner.start(
                    { facingMode: 'environment' },
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    (decodedText) => {
                        const room = decodedText.trim()
                        if (room) {
                            window.syncAPI.setRoom(room)
                            stopQrSyncScan()
                        }
                    },
                    () => {}
                )
            } catch (err) {
                console.error('QR scanner error:', err)
                stopQrSyncScan()
            }
        }

        window.stopQrSyncScan = function() {
            if (qrSyncScanner) {
                qrSyncScanner.stop().then(() => {
                    qrSyncScanner = null
                }).catch(() => {})
            }
            document.getElementById('qrScannerContainer').style.display = 'none'
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme)
            localStorage.setItem('isbnscanner-theme', theme)
            const btn = document.getElementById('darkModeBtn')
            if (btn) btn.innerHTML = theme === 'dark' ? '&#127769; Light' : '&#127769; Dark'
        }

        window.toggleDarkMode = function() {
            const current = document.documentElement.getAttribute('data-theme')
            applyTheme(current === 'dark' ? 'light' : 'dark')
        }

        ;(function initTheme() {
            const saved = localStorage.getItem('isbnscanner-theme')
            if (saved) {
                document.documentElement.setAttribute('data-theme', saved)
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.setAttribute('data-theme', 'dark')
            }
        })()

        async function main() {
            try {
                const api = await initialize()
                updateSyncUI(api.getStatus())
                loadCollection()
                api.onChange(() => loadCollection())
                api.onStatusChange(updateSyncUI)
            } catch (err) {
                console.error('Sync init failed:', err)
                document.getElementById('syncStatusText').textContent = 'Sync unavailable'
            }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
        }

        main()
    </script>
</body>
</html>
